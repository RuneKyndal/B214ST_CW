<meta name="apple-mobile-web-app-capable" content="yes">

<title>Bell 214ST — CWP Quick Reference</title>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;height:100%;background:#111;color:#fff;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;overflow:hidden;}

/* ── PAGES ── */
.page{position:fixed;inset:0;display:none;flex-direction:column;background:#111;overflow:hidden;z-index:10;}
.page.active{display:flex;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#1a1a1a;border-bottom:2px solid #333;flex-shrink:0;}
.hdr-title{font-size:1rem;font-weight:bold;text-transform:uppercase;letter-spacing:1px;flex:1;text-align:center;}
.btn-back{background:#c00;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-weight:bold;font-size:0.85rem;cursor:pointer;flex-shrink:0;}
.btn-back:active{opacity:0.7;}

/* ── HOME PAGE ── */
#home{overflow-y:auto;}
.home-title{text-align:center;padding:10px 8px 4px;font-size:1.1rem;font-weight:bold;color:#ff0;letter-spacing:2px;}
.home-sub{text-align:center;font-size:0.75rem;color:#aaa;padding-bottom:8px;}

/* ── CWP SVG PANEL ── */
#cwp-wrap{width:100%;overflow-x:auto;overflow-y:auto;flex:1;padding:6px 4px;}
#cwp-wrap svg{display:block;margin:0 auto;max-width:100%;height:auto;}

/* Clickable light styles */
.cw-light{cursor:pointer;}
.cw-light rect{rx:3;ry:3;}
.cw-light:active rect{opacity:0.6;}
.cw-fire rect{fill:#c00;stroke:#ff4444;stroke-width:1;}
.cw-fire text{fill:#fff;font-weight:bold;}
.cw-warn rect{fill:#1a1a1a;stroke:#ff4444;stroke-width:1.5;}
.cw-warn text{fill:#ff4444;font-weight:bold;}
.cw-caut rect{fill:#1a1a1a;stroke:#ffcc00;stroke-width:1;}
.cw-caut text{fill:#ffcc00;font-weight:bold;}
.cw-afcs rect{fill:#1a1a1a;stroke:#ffcc00;stroke-width:1;}
.cw-afcs text{fill:#ffcc00;font-weight:bold;}
.cw-master rect{fill:#c00;stroke:#ff4444;stroke-width:2;}
.cw-master text{fill:#fff;font-weight:bold;}
.cw-rotor rect{fill:#1a1a1a;stroke:#ff4444;stroke-width:2;}
.cw-rotor text{fill:#ff4444;font-weight:bold;}
.cw-blank rect{fill:#222;stroke:#444;stroke-width:1;}
.cw-blank text{fill:#555;}
.cw-chip rect{fill:#111;stroke:#888;stroke-width:1;}
.cw-chip text{fill:#888;}
.cw-annun rect{fill:#1a1a1a;stroke:#ffcc00;stroke-width:1;}
.cw-annun text{fill:#ffcc00;}
.cw-green rect{fill:#1a1a1a;stroke:#00cc44;stroke-width:1;}
.cw-green text{fill:#00cc44;font-weight:bold;}
.cw-nolink rect{fill:#1a1a1a;stroke:#555;stroke-width:1;}
.cw-nolink text{fill:#666;}

/* ── PROC PAGE ── */
#proc-page{overflow:hidden;}
#proc-scroll{flex:1;overflow-y:auto;padding:10px 12px 20px;}
.proc-type{display:inline-block;padding:3px 10px;border-radius:4px;font-size:0.7rem;font-weight:bold;text-transform:uppercase;margin-bottom:6px;}
.proc-type.emergency{background:#c00;color:#fff;}
.proc-type.abnormal{background:#886600;color:#fff;}
.proc-title{font-size:1.3rem;font-weight:bold;color:#ff0;margin:0 0 12px;}
.proc-sub{font-size:1rem;font-weight:bold;color:#fff;margin:14px 0 6px;text-decoration:underline;}
.proc-label{font-size:0.8rem;font-weight:bold;color:#aaa;text-transform:uppercase;margin:10px 0 4px;}
.proc-items{list-style:disc;padding-left:20px;margin:4px 0 10px;}
.proc-items li{font-size:0.9rem;line-height:1.5;margin-bottom:4px;}
.proc-steps{list-style:none;padding:0;margin:4px 0 10px;}
.proc-steps li{display:flex;gap:8px;font-size:0.9rem;line-height:1.4;margin-bottom:6px;border-bottom:1px solid #222;padding-bottom:6px;}
.step-num{flex-shrink:0;font-weight:bold;color:#ffcc00;min-width:20px;}
.step-action{flex:1;}
.step-cmd{float:right;font-weight:bold;color:#fff;text-align:right;padding-left:8px;}
.proc-note{background:#1a1a00;border-left:3px solid #886600;padding:8px 10px;margin:8px 0;border-radius:0 4px 4px 0;font-size:0.82rem;font-style:italic;line-height:1.5;}
.proc-caution{background:#1a0000;border:1px dashed #c00;padding:8px 10px;margin:8px 0;border-radius:4px;font-size:0.82rem;font-style:italic;line-height:1.5;text-align:center;}
.proc-warning{background:#2a0000;border:2px solid #c00;padding:10px 12px;margin:10px 0;border-radius:4px;font-size:0.85rem;font-weight:bold;font-style:italic;line-height:1.5;text-align:center;}
.proc-warning::before{content:"⚠ WARNING";display:block;font-size:0.9rem;margin-bottom:4px;}
.cw-light-ref{display:inline-block;background:#1a1a1a;border:1.5px solid #ffcc00;color:#ffcc00;font-size:0.7rem;font-weight:bold;padding:1px 6px;border-radius:2px;margin:0 2px;}
.cw-light-ref.red{border-color:#ff4444;color:#ff4444;}
.proc-dev{color:#555;font-style:italic;text-align:center;margin-top:30px;font-size:0.9rem;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}
</style>
</head>

<!-- ══════════════════════════════════════════
     PROCEDURE PAGE
════════════════════════════════════════════ -->
<div id="proc-page" class="page">
  <div class="hdr">
    <button class="btn-back" onclick="goHome()">◀ CWP</button>
    <div class="hdr-title" id="proc-hdr-title">Procedure</div>
  </div>
  <div id="proc-scroll"></div>
</div>

<script>
// ── Navigation ──────────────────────────────
function showProc(id) {
  var content = PROCS[id];
  if (!content) content = '<p class="proc-dev">Content under development for: ' + id + '</p>';
  document.getElementById('proc-scroll').innerHTML = content;
  document.getElementById('proc-hdr-title').textContent = PROC_TITLES[id] || id.toUpperCase();
  document.getElementById('home').classList.remove('active');
  document.getElementById('proc-page').classList.add('active');
  document.getElementById('proc-scroll').scrollTop = 0;
}
function goHome() {
  document.getElementById('proc-page').classList.remove('active');
  document.getElementById('home').classList.add('active');
}

// ── Procedure titles ────────────────────────
var PROC_TITLES = {
  'fire-eng':       'ENGINE FIRE',
  'bag-fire':       'BAGGAGE FIRE / SMOKE',
  'eng-out':        'ENGINE OUT',
  'master-caution': 'MASTER CAUTION',
  'rotor-rpm':      'ROTOR RPM / NP UNDERSPEED / OVERSPEED',
  'fuel-press':     'FUEL SUCTION PUMP / LOW PRESSURE',
  'fuel-low':       'FUEL LOW',
  'fuel-filter':    'FUEL FILTER PARTIALLY CLOGGED',
  'fuel-valve':     'FUEL VALVE IN TRANSIT',
  'fuel-trans':     'NO FUEL TO AFT FLOOR CELL',
  'interconn-valve':'FUEL INTERCONNECT VALVE IN TRANSIT',
  'eng-oil':        'ENGINE OIL PRESSURE',
  'ecu-lockout':    'ECU LOCKOUT',
  'eng-chip':       'ENGINE CHIP',
  'gr-box-chip':    'COMBINING GEARBOX / CHIP',
  'gearbox-oil':    '42/90° GEARBOX OIL',
  'xmsn-oil':       'TRANSMISSION OIL PRESSURE / TEMPERATURE',
  'cbox-oil':       'C-BOX OIL PRESSURE / TEMPERATURE',
  'xmsn-chip':      'TRANSMISSION CHIP',
  'tr-drive':       'CHIP 42/90 / T/R DRIVE',
  'oil-cooler':     'OIL COOLER',
  'gen-hot':        'GENERATOR OVERHEAT',
  'gen-fail':       'GENERATOR FAILURE',
  'bus-feeder':     'BUS FEEDER',
  'inverter':       'INVERTER FAILURE',
  'batt-sys':       'BATTERY SYSTEM',
  'batt-temp':      'BATTERY TEMPERATURE',
  'hydraulic':      'HYDRAULIC SYSTEM FAILURES',
  'utility-hyd':    'UTILITY HYDRAULIC SYSTEM',
  'oil-cooler':     'OIL COOLER',
  'htr-air-lines':  'HEATER MIXING VALVE FAILURE',
  'blower-off':     'PARTICLE SEPARATOR BLOWER',
  'wshld-htr':      'WINDSHIELD OVERHEAT',
  'caut-pnl':       'CAUTION PANEL INOPERATIVE',
  'door-lock':      'DOOR LOCK',
  'rotor-brake':    'ROTOR BRAKE',
  'afcs':           'AFCS MALFUNCTIONS',
  'as3':            'A/S 3 FAILURE',
  'elev':           'FLY-BY-WIRE ELEVATOR SYSTEM FAILURE',
  'eng-out-emg':    'SINGLE / DUAL ENGINE FAILURE',
  'eng-anti-ice':   'ENGINE INLET ANTI-ICE',
  'brakes':         'BRAKES',
  'anti-ice':       'ANTI-ICE ON',
  'cargo-hook':     'CARGO HOOK',
  'hoist':          'HOIST',
  'floats':         'FLOATS ARM',
  'spare':          'SPARE',
  'ext-power':      'EXT POWER',
};

// ── Helper HTML builders ────────────────────
function ptype(t){return '<span class="proc-type '+t+'">'+t.toUpperCase()+' PROCEDURE</span>';}
function ptitle(t){return '<h2 class="proc-title">'+t+'</h2>';}
function psub(t){return '<div class="proc-sub">'+t+'</div>';}
function plabel(t){return '<div class="proc-label">'+t+'</div>';}
function pnote(t){return '<div class="proc-note"><strong>NOTE</strong><br>'+t+'</div>';}
function pcaut(t){return '<div class="proc-caution">'+t+'</div>';}
function pwarn(t){return '<div class="proc-warning">'+t+'</div>';}
function plight(t,red){return '<span class="cw-light-ref'+(red?' red':'')+'">'+t+'</span>';}
function pbullets(arr){return '<ul class="proc-items">'+arr.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul>';}
function psteps(arr){
  return '<ol class="proc-steps">'+arr.map(function(s,i){
    return '<li><span class="step-num">'+(i+1)+'.</span><span class="step-action">'+s[0]+(s[1]?'<span class="step-cmd">'+s[1]+'</span>':'')+'</span></li>';
  }).join('')+'</ol>';
}

// ── PROCEDURES DATABASE ──────────────────────
var PROCS = {};

// ── ENGINE FIRE ─────────────────────────────
PROCS['fire-eng'] = ptype('emergency')+ptitle('ENGINE FIRE')+
psub('ENGINE HOT START')+
plabel('Indications')+pbullets(['MGT exceeds 850°C before idle speed is reached.'])+
plabel('Procedures')+psteps([
  ['Throttle (affected engine)','CLOSE'],
  ['ENGINE FUEL Switch (affected engine)','OFF'],
  ['ENG START Switch','ENERGIZE — continue until MGT decreases below 275°C.'],
  ['Use normal aircraft shutdown procedures.','']
])+
psub('ENGINE FIRE ON START (External)')+
plabel('Indications')+pbullets([plight('FIRE ENG 1',true)+' or '+plight('FIRE ENG 2',true)+' light illuminates.','Smoke.','Fire.'])+
plabel('Procedures')+psteps([
  ['Throttle (affected engine)','CLOSE'],
  ['ENG Fire Extinguisher Switch (affected engine)','ARM'],
  ['AGENT RLSE Switch','BLT 1'],
  ['If fire light does not extinguish — AGENT RLSE Switch','BLT 2'],
  ['Fuel and Electrical Switches','OFF'],
  ['Exit helicopter after shutdown is completed.','']
])+
psub('ENGINE FIRE IN FLIGHT')+
plabel('Indications')+pbullets([plight('FIRE ENG 1',true)+' or '+plight('FIRE ENG 2',true)+' light illuminates.','Smoke.','Fumes.','Fire.'])+
pnote('Selecting ARM with either ENG fire switch will close both engine bleed air valves, causing loss of the cabin heater and secondary oil cooler blower. If the remaining engine is operating below maximum MGT and power, the appropriate bleed air override switch may be used to regain bleed air.')+
plabel('Procedures')+psteps([
  ['Throttle (affected engine) — Reduce power and maintain control.','CLOSE'],
  ['ENG Fire Extinguisher Switch (affected engine)','ARM'],
  ['AGENT RLSE Switch','BTL 1'],
  ['ENGINE FUEL Switch (affected engine)','OFF'],
  ['TRANS PUMP Switches','ON'],
  ['FUEL PRIME Switch (affected engine)','OFF'],
  ['GRAVITY INTCON Switch','OPEN'],
  ['If Fire Warning Light remains illuminated — AGENT RLSE Switch','BLT 2'],
  ['Land as soon as possible on remaining engine.','']
])+
pwarn('If fire indications persist, land immediately.');

// ── BAG FIRE ────────────────────────────────
PROCS['bag-fire'] = ptype('emergency')+ptitle('BAGGAGE FIRE / SMOKE')+
plabel('Indications')+pbullets([plight('L BAG FIRE',true)+' or '+plight('R BAG FIRE',true)+' warning light illuminates.'])+
plabel('Procedures')+psteps([
  ['Land as soon as possible.',''],
  ['Helicopter','SHUTDOWN'],
  ['Inspect for damage.','']
]);

// ── SMOKE & FUME ELIMINATION ────────────────
PROCS['smoke-fume'] = ptype('emergency')+ptitle('SMOKE AND FUME ELIMINATION')+
plabel('Procedures')+psteps([
  ['Cockpit Window(s)','OPEN'],
  ['Cockpit and Cabin Vents','OPEN'],
  ['HEATER Switches','OFF']
]);

// ── ENG OUT ─────────────────────────────────
PROCS['eng-out'] = ptype('emergency')+ptitle('ENGINE OUT')+
psub('SINGLE ENGINE FAILURE DURING TAKEOFF')+
plabel('Indications')+pbullets(['Left yaw.','Master caution light and appropriate caution panel lights illuminate.',plight('ENG OUT',true)+' warning light (affected engine) illuminates.','Rotor RPM decrease (possibly).',plight('ROTOR RPM',true)+' warning light (possibly).','Engine instrument readings of affected engine decrease.'])+
plabel('Procedures')+psteps([
  ['Maintain heading control and adjust attitude as necessary.',''],
  ['Collective — Maintain rotor RPM or control rate of descent and cushion landing.','ADJUST'],
  ['Land as soon as practical.',''],
  ['Helicopter','SHUTDOWN']
])+
psub('SINGLE ENGINE FAILURE — HOVERING IGE')+psteps([
  ['Maintain heading control and adjust attitude as necessary.',''],
  ['Collective — Maintain hover or control rate of descent and cushion landing.','ADJUST'],
  ['Land as soon as practical.',''],
  ['Helicopter','SHUTDOWN']
])+
psub('SINGLE ENGINE FAILURE — HOVERING OGE')+psteps([
  ['Heading','MAINTAIN'],
  ['Attitude','ADJUST AS REQUIRED'],
  ['Collective — Maintain hover or control rate of descent and cushion landing.','ADJUST'],
  ['Land as soon as practical.',''],
  ['Helicopter','SHUTDOWN']
])+
psub('SINGLE ENGINE FAILURE INFLIGHT')+psteps([
  ['Rotor RPM','MAINTAIN WITHIN LIMITS'],
  ['Collective','ADJUST TO OEI LIMITS OR BELOW'],
  ['Airspeed','ADJUST TO BELOW SINGLE ENGINE V<sub>NE</sub>'],
  ['Failed Engine','IDENTIFY'],
  ['Throttle (affected engine)','CLOSE'],
  ['ENGINE FUEL Switch (affected engine)','OFF'],
  ['GRAVITY INTCON Switch','OPEN'],
  ['MASTER CAUTION Light','RESET'],
  ['Airstart if conditions permit — see ENGINE RESTART IN FLIGHT (AIRSTART).',''],
  ['Land as soon as practical.','']
])+pnote('If engine failure is due to fuel starvation, leave GRAVITY INTCON switch closed.')+
psub('DUAL ENGINE FAILURE')+
pnote('Minimum rate of descent airspeed is 75 KIAS. Maximum range airspeed is 105 KIAS.')+
plabel('Indications')+pbullets(['Left yaw.','ROTOR RPM decreases.',plight('1 ENG OUT',true)+' and '+plight('2 ENG OUT',true)+' lights illuminate.','Both engines instrument readings decrease.',plight('ROTOR RPM',true)+' caution light and audio.'])+
psteps([
  ['Collective — Enter autorotative descent.','DOWN'],
  ['Airspeed','MAXIMUM GLIDE DISTANCE OR MINIMUM RATE OF DESCENT'],
  ['If unable to airstart, close throttles and shut off fuel.',''],
  ['Conduct autorotative procedures.','']
])+pnote('If conditions permit, attempt an airstart.');

// ── ENGINE RESTART IN FLIGHT ────────────────
PROCS['airstart'] = ptype('emergency')+ptitle('ENGINE RESTART IN FLIGHT (AIRSTART)')+
pcaut('If cause of failure is obviously mechanical as evidenced by abnormal, metallic, or grinding sounds, do not attempt an airstart.')+
psteps([
  ['Maintain control of helicopter.',''],
  ['GRAVITY INCON Switch — Check OPEN (if no evidence of fuel leak on failed engine side).','CHECK'],

plabel('Actions')+psteps([
  ['Monitor engine instruments.',''],
  ['Correct prior to next flight.','']
]);

// ── WSHLD HTR ────────────────────────────────
PROCS['wshld-htr'] = ptype('abnormal')+ptitle('WINDSHIELD OVERHEAT')+
plabel('Indications')+pbullets([plight('PILOT WSHLD HTR')+' or '+plight('COPILOT WSHLD HTR')+' light illuminates.'])+
plabel('Actions')+psteps([['HEATED WINDSHIELD Switch (affect windshield)','OFF']])+
psub('CRACKED WINDSHIELD')+
plabel('Procedures')+psteps([
  ['Airspeed','100 KIAS OR LESS'],
  ['If cracked impairs crew vision — Land as soon as practical.','']
]);

// ── CAUT PNL ─────────────────────────────────
PROCS['caut-pnl'] = ptype('abnormal')+ptitle('CAUTION PANEL INOPERATIVE')+
plabel('Indications')+pbullets([plight('CAUT PNL')+' light illuminates.'])+
plabel('Actions')+psteps([
  ['CAUT PNL circuit breaker','CHECK IN'],
  ['If circuit breaker will not reset — CAUTION PNL FAIL circuit breaker','PULL — Verify red MASTER CAUTION light extinguishes.'],
  ['Scan instruments more frequently.',''],
  ['Land as soon as practical.',''],
  ['Correct prior to next flight.','']
]);

// ── DOOR LOCK ─────────────────────────────────
PROCS['door-lock'] = ptype('abnormal')+ptitle('DOOR LOCK')+
plabel('Indications')+pbullets([plight('DOOR LOCK')+' light illuminates.'])+
plabel('Actions')+psteps([['Check door(s) closed and locked.','']]);

// ── ROTOR BRAKE ───────────────────────────────
PROCS['rotor-brake'] = ptype('emergency')+ptitle('ROTOR BRAKE')+
plabel('Indications')+pbullets([plight('ROTOR BRAKE',true)+' warning light illuminates.'])+
plabel('Actions')+psteps([
  ['Rotor brake handle','ENSURE HANDLE IN DETENT POSITION'],
  ['If light does not extinguish — Land as soon as possible.','']
]);

// ── AFCS ──────────────────────────────────────
PROCS['afcs'] = ptype('abnormal')+ptitle('AFCS MALFUNCTIONS')+
psub('SCAS FAILURE — AARS NOT ENGAGED')+
plabel('Indications')+pbullets([plight('AFCS CAUTION')+' light illuminates.','Pitch/roll/yaw attitude change.','Flight control annunciator light illuminated above SCAS ENGA light.'])+
plabel('Procedures')+psteps([
  ['Attitude','ADJUST CYCLIC TO LEVEL HELICOPTER'],
  ['SCAS AC and DC circuit breakers','CHECK IN'],
  ['SCAS','RE-ENGAGE'],
  ['If channel will not re-engage, continue flight with operative channels, if VMC.',''],
  ['If IMC, engage AARS. Avoid using force TRIM REL button — it will result in momentary loss of AARS.',''],
  ['If heading and altitude hold modes are not engaged, use ATTD TRIM switch "beep" to fly pitch and/or roll.','']
])+pnote('If circuit breakers are reset, wait 30 seconds before engaging SCAS.')+
psub('SCAS FAILURE — AARS ENGAGED (PITCH AND/OR ROLL AND/OR YAW)')+
plabel('Indications')+pbullets([plight('AFCS CAUTION')+' light illuminates.','Flight control annunciator light (P and/or R) illuminates.','Yaw oscillations if yaw SCAS failed.'])+
psteps([
  ['SCAS AC and DC circuit breakers','CHECK IN'],
  ['SCAS','RE-ENGAGE'],
  ['If channel will not re-engage — Avoid using TRIM REL button.',''],
  ['Engage HDG SEL function and utilize HDG set command for heading changes.',''],
  ['Exercise care in using ATTD TRIM switch so that inadvertent pilot stick motions are not made.','']
])+
psub('AARS FAILURE (SINGLE CHANNEL)')+
plabel('Indications')+pbullets([plight('AFCS CAUTION')+' light illuminates.','Attitude change.','Flight Control Annunciator light (P or R) illuminated above AARS ENGA light.'])+
psteps([
  ['Attitude','ADJUST'],
  ['AARS AC and DC circuit breakers','CHECK IN'],
  ['AARS','RE-ENGAGE'],
  ['If channel will not re-engage — Continue flight with operative channel. Use cyclic force TRIM REL button to fly inoperative axis.','']
])+
psub('AARS FAILURE — LOSS OF PILOT/COPILOT ATTITUDE GYRO OR 155 VAC BUS')+
plabel('Indications')+pbullets([plight('AFCS CAUTION')+' light illuminates.','Attitude change.','Attitude gyro OFF flag visible.','AARS ENGA light extinguishes.','Flight control annunciator lights (P and R) illuminate.'])+
psteps([
  ['Attitude','ADJUST'],
  ['INST PWR and AS SYS 1 and 2 circuit breakers','CHECK IN'],
  ['If flag biases from view — Re-engage AARS.',''],
  ['If flag remains visible — Continue flight in SCAS mode using operative gyro.','']
])+
psub('AARS FAILURE — CAUSED BY LOSS OF INVERTER 1')+
plabel('Indications')+pbullets([plight('AFCS CAUTION')+' light illuminates. Flight control annunciator lights (P and R) illuminate.','Attitude change.',plight('INV 1')+' caution light illuminated.','AARS ENGA light extinguishes.'])+
psteps([
  ['Attitude','ADJUST'],
  ['Re-engage AARS.',''],
  ['Continue flight.','']
]);

// ── A/S 3 ─────────────────────────────────────
PROCS['as3'] = ptype('abnormal')+ptitle('A/S 3 FAILURE')+
plabel('Indications')+pbullets([plight('A/S 3')+' annunciator light illuminated.',plight('AFCS CAUTION')+' light illuminated.'])+
plabel('Procedures')+psteps([['A/S 3 Reset Switch','RESET']])+
pnote('With failure of Airspeed System 3, a subsequent failure of another airspeed system will result in elevator locking in position. If this occurs, follow dual FBW system failure procedures.');

// ── ELEV / FBW ────────────────────────────────
PROCS['elev'] = ptype('abnormal')+ptitle('FLY-BY-WIRE ELEVATOR SYSTEM FAILURE')+
plabel('Indications')+pbullets([plight('AFCS CAUTION')+' light illuminates.','Flight control annunciator light '+plight('ELEV 1')+', '+plight('ELEV 2')+', or '+plight('A/S 3')+' illuminated.','Improper pitch attitude for flight condition (for dual elevator failure).','Elevator position indicator inoperative or not functioning properly.'])+
psub('SINGLE FBW SYSTEM FAILURE')+
plabel('Procedures')+psteps([
  ['ELEV 1, ELEV 2 AC and DC circuit breakers','CHECK IN'],
  ['If affected system is not returned to normal — ELEV SYS 1/SYS 2 PWR Switch (affected system)','OFF, THEN ON'],
  ['Wait for normal engage time.',''],
  ['If failed system does not re-engage — ELEV SYS 1/SYS 2 PWR Switch (affected system)','OFF'],
  ['Airspeed','SINGLE ELEVATOR FAILURE V<sub>NE</sub> OR LOWER']
])+
psub('DUAL FBW SYSTEM FAILURE')+psteps([
  ['INV PWR and INV FEED circuit breakers','CHECK IN'],
  ['If inverters fail to reset — INVERTER Switches','OFF'],
  ['Airspeed','DUAL ELEVATOR FAILURE V<sub>NE</sub> OR LOWER'],
  ['Altitude — Climb or descend to attain VMC conditions.','AS REQUIRED'],
  ['Land as soon as practical.','']
]);

// ── TAIL ROTOR FAILURES ───────────────────────
PROCS['tail-rotor'] = ptype('emergency')+ptitle('TAIL ROTOR FAILURES')+
psub('COMPLETE LOSS OF TAIL ROTOR THRUST')+
'<p style="font-size:0.9rem;line-height:1.5;margin-bottom:6px;">Failure involving a break in the drive system — tail rotor stops turning and delivers no thrust. In powered flight, will result in nose swinging right (left side slip) and usually a roll of the fuselage. Nose down tucking will also be present.</p>'+
plabel('Corrective Action — Hovering')+pbullets(['Chop throttles (twist grips) immediately.','Make a hovering autorotation landing.','A slight rotation can be expected on touchdown.'])+
plabel('Corrective Action — Climb/Level Flight/Power Drive')+pbullets(['Chop throttles and lower collective pitch immediately.','Establish glide speed slightly above normal autorotation approach speed.','Once aligned for landing, use pulse collective technique to maintain heading.'])+
pnote('By moving the collective upward abruptly, you create more load on the rotor. Do not hold the collective up — RPM will decrease. The pulse should be rapid (up and down) and not used at low altitudes.')+
psub('FIXED PITCH FAILURES')+
'<p style="font-size:0.9rem;line-height:1.5;">Characterized by lack of directional response when pedal is pushed, or pedals in locked position. Do not attempt maximum pedal force. Fly helicopter to suitable landing area using combinations of engine torque, rotor RPM, and airspeed to correct yaw.</p>'+
psub('MAIN DRIVESHAFT FAILURE')+
pwarn('Failure of the main driveshaft will result in complete loss of power to the main rotor. Autorotative flight procedures must be established IMMEDIATELY. Failure to react immediately will result in loss of control.')+
plabel('Indications')+pbullets(['Left yaw.','Rapid decrease in N<sub>R</sub>.',plight('ROTOR RPM',true)+' warning light with audio.','Possible increase in noise — overspeeding engine turbines, CBOX, or driveshaft breakage.'])+
psteps([
  ['Collective','AS REQUIRED — Establish autorotation descent.'],
  ['Airspeed','ESTABLISH minimum rate of descent or maximum glide.'],
  ['Throttles','OFF, if time permits'],
  ['Controls','AS REQUIRED FOR AUTOROTATIVE LANDING']
])+pnote('The engine will flameout if power turbine speed (N<sub>P</sub>) reaches or exceeds 117%.');

// ── ANTI-ICE ─────────────────────────────────
PROCS['anti-ice'] = ptype('abnormal')+ptitle('ANTI-ICE ON')+
plabel('Indication')+pbullets([plight('ANTI-ICE ON')+' light illuminates — indicates that engine anti-ice is active.'])+
'<p style="font-size:0.9rem;color:#aaa;">No abnormal procedure required unless anti-ice is NOT commanded on. If illuminated unexpectedly, monitor engine performance and check anti-ice switches.</p>';

// ── ENG ANTI-ICE ─────────────────────────────
PROCS['eng-anti-ice'] = ptype('abnormal')+ptitle('ENGINE INLET ANTI-ICE')+
plabel('Indication')+pbullets([plight('ENG 1 INLET ANTI-ICE')+' or '+plight('ENG 2 INLET ANTI-ICE')+' light illuminates — indicates that inlet anti-ice is active.'])+
'<p style="font-size:0.9rem;color:#aaa;">Advisory light only. Illuminates when anti-ice is selected ON. No abnormal action required unless illuminating unexpectedly.</p>';

// ── CARGO HOOK ───────────────────────────────
PROCS['cargo-hook'] = ptype('abnormal')+ptitle('CARGO HOOK')+
plabel('Indications')+pbullets([plight('CARGO HOOK ARM')+' — indicates hook is armed.',plight('CARGO HOOK OPEN')+' — indicates hook is open / load has been released.'])+
'<p style="font-size:0.9rem;color:#aaa;">Verify hook status is as commanded. If CARGO HOOK OPEN illuminates unexpectedly during flight with load attached, load may have been jettisoned — adjust aircraft attitude/power accordingly.</p>';

// ── HOIST ────────────────────────────────────
PROCS['hoist'] = ptype('abnormal')+ptitle('HOIST 20 FT WARNING')+
plabel('Indication')+pbullets([plight('HOIST 20 FT WARN')+' light illuminates — hoist cable is within 20 feet of fully retracted.'])+
'<p class="proc-dev">Refer to hoist operations section of the RFM for specific procedures.</p>';

// ── FLOATS ───────────────────────────────────
PROCS['floats'] = ptype('abnormal')+ptitle('FLOATS ARM')+
plabel('Indication')+pbullets([plight('FLOATS ARM')+' light illuminates — float inflation system is armed.'])+
'<p class="proc-dev">Verify float arm switch position is as commanded. Refer to float operations supplement for procedures.</p>';

// ── SPARE / BRAKES / EXT POWER ───────────────
PROCS['spare'] = '<p class="proc-dev">SPARE — No procedure assigned to this light position.</p>';
PROCS['brakes'] = ptype('abnormal')+ptitle('BRAKES')+
plabel('Indication')+pbullets([plight('BRAKES')+' light illuminates.'])+
'<p class="proc-dev">Check parking brake handle position. Ensure brakes are released for flight. Refer to RFM for specific brake system procedures.</p>';
PROCS['ext-power'] = '<p class="proc-dev">EXT POWER — Advisory light. Illuminates when external power is connected. No abnormal procedure.</p>';

</script>
